<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        /* Logo más grande SOLO para la página principal */
        .logo-img {
            height: 120px; 
        }

        /* Fondo oscuro estilo Patria aplicado al carrusel actual */
        .carousel .slide {
            position: relative; /* Necesario para la capa oscura */
            background-size: cover;
            background-position: center;
        }

        /* Capa oscura semitransparente */
        .carousel .slide::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65); /* Fondo oscuro */
            z-index: 1;
        }

        /* NUEVO: Configuración del slide que contiene el póster */
        .carousel .slide.image-only {
            /* Centra la imagen perfectamente */
            display: flex;
            justify-content: center;
            align-items: center;
            /* Un color de fondo suave por si la pantalla es muy grande */
            background-color: #111; 
        }

        /* Quita el fondo oscuro solo en este carrusel */
        .carousel .slide.image-only::before {
            display: none;
        }

        /* NUEVO: Estilo de la imagen para que no sea gigante */
        .slide-poster-img {
            /* Limita la altura para que no ocupe toda la pantalla */
            max-height: 75vh; 
            /* Limita el ancho para que no se estire en monitores muy anchos */
            max-width: 400px; 
            width: auto;
            height: auto;
            /* Sombra para darle efecto de tarjeta flotante */
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
            /* Bordes redondeados opcionales */
            border-radius: 8px;
            z-index: 2;
        }

        /* Contenedor de los textos (para los otros slides) */
        .slide-content {
            position: relative;
            z-index: 2; /* Asegura que el texto quede por encima del fondo oscuro */
            color: white;
            text-align: center;
            padding: 1.5rem;
            max-width: 900px;
        }

        /* Estilo del título */
        .slide-content h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.8rem;
            line-height: 1.3;
            text-transform: uppercase;
        }

        /* Estilo del subtítulo */
        .slide-content p {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- Menú superior normal -->
    <header>
        <div class="logo" style="display: flex; align-items: center; gap: 15px;">
            <img src="img/imagen.jpeg" alt="Logo" class="logo-img">
            
        </div>
        <div class="menu-right">
            <a href="seccion/inicio_seccion.php">Inicio de Sesión</a>
            <a href="registro/registro_seccion.php">Registro</a> 
        </div>
    </header>

    <!-- Carrusel -->
    <section class="carousel">
        <div class="carousel-slides" id="slides">
            
            <div class="slide" style="background: linear-gradient(45deg, #003366 0%, #8b0000 100%);">
                <div class="slide-content">
                    <h1>Mi prioridad no es un cargo si no hacer un reversible está revolución</h1>
                    <p>Gestión Comunitaria Chavez y Robert La Fuerza Eterna</p>
                </div>
            </div>

            <div class="slide" style="background: linear-gradient(45deg, #8b0000 0%, #003366 100%);">
                <div class="slide-content">
                    <h1>Innovando por nuestra Comuna</h1>
                    <p>Tecnología al servicio del pueblo</p>
                </div>
            </div>

            <!-- Último carrusel:  -->
            <div class="slide image-only">
                <img src="img/imagen2.jpeg" alt="Póster" class="slide-poster-img">
            </div>

        </div>
        <button class="carousel-nav prev" onclick="changeSlide(-1)">‹</button>
        <button class="carousel-nav next" onclick="changeSlide(1)">›</button>
        <div class="carousel-dots" id="dots"></div>
    </section>

    <main>
        <!-- Contenido adicional aquí si aplica -->
    </main>

    <script src="js/scripts.js"></script>
</body>
</html>
